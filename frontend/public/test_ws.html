<!DOCTYPE html>
<html>
<head>
  <title>Haven WebSocket Diagnostic</title>
  <style>
    body {
      font-family: monospace;
      background: #121212;
      color: #00ff00;
      padding: 2rem;
    }
    h1 {
      color: #fff;
    }
    .log-item {
      margin-bottom: 0.5rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.5rem;
    }
    .error {
      color: #ff0000;
    }
    .success {
      color: #00ff00;
    }
    .info {
      color: #00ffff;
    }
  </style>
</head>
<body>
  <h1>Haven WebSocket Connection Diagnostic</h1>
  <div id="status">Testing connection...</div>
  <hr/>
  <div id="logs"></div>

  <script>
    const logsDiv = document.getElementById('logs');
    const statusDiv = document.getElementById('status');

    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = `log-item ${type}`;
      div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logsDiv.insertBefore(div, logsDiv.firstChild);
    }

    async function runDiagnostic() {
      log("Checking localStorage for tokens...");
      const token = localStorage.getItem("haven_access_token");
      if (!token) {
        log("No access token found in localStorage. Please log in first at /auth/login.", "error");
        statusDiv.innerText = "Error: Not Logged In";
        return;
      }
      log("Found access token. Decoding payload...", "success");

      try {
        const parts = token.split('.');
        const payload = JSON.parse(atob(parts[1]));
        log(`Token claims - User ID: ${payload.user_id}, Username: ${payload.username}`);
        log(`Token Issued At: ${new Date(payload.iat * 1000).toLocaleString()}`);
        log(`Token Expires At: ${new Date(payload.exp * 1000).toLocaleString()}`);
        log(`Current Browser Time: ${new Date().toLocaleString()}`);
        
        const remaining = payload.exp * 1000 - Date.now();
        if (remaining <= 0) {
          log("Token is EXPIRED according to browser time!", "error");
        } else {
          log(`Token is valid for another ${Math.round(remaining / 1000)} seconds.`, "success");
        }
      } catch (e) {
        log("Failed to decode token: " + e.message, "error");
      }

      // Test HTTP connection first
      log("Testing fetch to /users/communities...");
      const apiUrl = "http://127.0.0.1:8080/api/v1";
      try {
        const res = await fetch(`${apiUrl}/users/communities`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        log(`Fetch response status: ${res.status} (${res.statusText})`);
        if (res.ok) {
          log("HTTP Authorization check passed successfully!", "success");
        } else {
          log("HTTP Authorization check failed!", "error");
        }
      } catch (err) {
        log(`Fetch request failed: ${err.message}. This might be a CORS or network interface issue.`, "error");
      }

      // Test WS URLs
      const wsTargets = [
        `ws://localhost:8080/ws?token=${token}`,
        `ws://127.0.0.1:8080/ws?token=${token}`,
        `ws://localhost:8080/api/v1/ws?token=${token}`
      ];

      for (const url of wsTargets) {
        log(`\nAttempting WebSocket connection to: ${url}...`, "info");
        try {
          const ws = new WebSocket(url);
          
          await new Promise((resolve) => {
            ws.onopen = () => {
              log(`SUCCESS: Connected to ${url}!`, "success");
              ws.close();
              resolve();
            };
            ws.onerror = (err) => {
              log(`ERROR: Connection failed for ${url}. readyState: ${ws.readyState}`, "error");
              resolve();
            };
          });
        } catch (wsErr) {
          log(`EXCEPTION: Failed to instantiate WebSocket: ${wsErr.message}`, "error");
        }
      }

      statusDiv.innerText = "Diagnostics complete.";
    }

    runDiagnostic();
  </script>
</body>
</html>
